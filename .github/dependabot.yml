version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # This assumes your package.json is in the root
    schedule:
      interval: "daily" # 'daily' is better if you're trying to catch up
    
    # This section solves your "too many PRs" problem
    groups:
      all-dependencies:
        patterns:
          - "*" # Groups every single update into one single PR
